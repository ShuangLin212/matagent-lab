<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">AR glasses candidate ranking chart</title>
  <desc id="desc">A horizontal bar chart showing MatAgent Lab candidate scores for AR glasses materials.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#17313a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #17313a; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #51656c; }
      .label { font: 700 15px Arial, Helvetica, sans-serif; fill: #17313a; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #51656c; }
      .score { font: 700 14px Arial, Helvetica, sans-serif; fill: #17313a; }
      .badge { font: 700 11px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .axis { stroke: #c9d8d8; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="660" rx="22" fill="#f7fbfc"/>
  <text class="title" x="60" y="58">AR Glasses Candidate Ranking</text>
  <text class="subtitle" x="60" y="84">Example discovery report: transparent, lightweight, stable materials ranked by total score and constraint satisfaction.</text>

  <rect x="60" y="120" width="1080" height="450" rx="10" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <line class="axis" x1="380" y1="158" x2="380" y2="528"/>
  <line class="axis" x1="380" y1="528" x2="1030" y2="528"/>
  <text class="small" x="380" y="548" text-anchor="middle">0.00</text>
  <text class="small" x="564" y="548" text-anchor="middle">0.20</text>
  <text class="small" x="748" y="548" text-anchor="middle">0.40</text>
  <text class="small" x="932" y="548" text-anchor="middle">0.60</text>
  <text class="small" x="1030" y="548" text-anchor="middle">0.70</text>

  <text class="label" x="92" y="176">MgAl2O4</text>
  <text class="small" x="92" y="196">Magnesium aluminate spinel</text>
  <rect x="380" y="159" width="650" height="26" rx="4" fill="#28566a"/>
  <text class="score" x="1044" y="178">0.706</text>
  <rect x="1096" y="160" width="46" height="22" rx="5" fill="#417b5a"/>
  <text class="badge" x="1119" y="175" text-anchor="middle">PASS</text>

  <text class="label" x="92" y="222">ZrO2</text>
  <text class="small" x="92" y="242">Zirconia high-index nanolaminate</text>
  <rect x="380" y="205" width="569" height="26" rx="4" fill="#417b5a"/>
  <text class="score" x="963" y="224">0.618</text>
  <rect x="1096" y="206" width="46" height="22" rx="5" fill="#417b5a"/>
  <text class="badge" x="1119" y="221" text-anchor="middle">PASS</text>

  <text class="label" x="92" y="268">Al2O3</text>
  <text class="small" x="92" y="288">ALD alumina optical barrier</text>
  <rect x="380" y="251" width="538" height="26" rx="4" fill="#6f8f99"/>
  <text class="score" x="932" y="270">0.584</text>
  <rect x="1096" y="252" width="46" height="22" rx="5" fill="#9b6a17"/>
  <text class="badge" x="1119" y="267" text-anchor="middle">WATCH</text>

  <text class="label" x="92" y="314">SiO2</text>
  <text class="small" x="92" y="334">Silica flexible encapsulant</text>
  <rect x="380" y="297" width="512" height="26" rx="4" fill="#6f8f99"/>
  <text class="score" x="906" y="316">0.556</text>
  <rect x="1096" y="298" width="46" height="22" rx="5" fill="#9b6a17"/>
  <text class="badge" x="1119" y="313" text-anchor="middle">WATCH</text>

  <text class="label" x="92" y="360">ZnO</text>
  <text class="small" x="92" y="380">Al-doped zinc oxide</text>
  <rect x="380" y="343" width="435" height="26" rx="4" fill="#b7c6c9"/>
  <text class="score" x="829" y="362">0.473</text>

  <text class="label" x="92" y="406">SnO2</text>
  <text class="small" x="92" y="426">F-doped tin oxide</text>
  <rect x="380" y="389" width="402" height="26" rx="4" fill="#b7c6c9"/>
  <text class="score" x="796" y="408">0.437</text>

  <text class="label" x="92" y="452">In2O3</text>
  <text class="small" x="92" y="472">Indium oxide transparent conductor</text>
  <rect x="380" y="435" width="377" height="26" rx="4" fill="#b7c6c9"/>
  <text class="score" x="771" y="454">0.410</text>

  <text class="label" x="92" y="498">Ga2O3</text>
  <text class="small" x="92" y="518">Gallium oxide dielectric layer</text>
  <rect x="380" y="481" width="346" height="26" rx="4" fill="#b7c6c9"/>
  <text class="score" x="740" y="500">0.376</text>

  <rect x="60" y="594" width="254" height="38" rx="8" fill="#17313a"/>
  <text x="82" y="618" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Top score: 0.706</text>
  <rect x="332" y="594" width="254" height="38" rx="8" fill="#28566a"/>
  <text x="354" y="618" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Pass rate: 25%</text>
  <rect x="604" y="594" width="254" height="38" rx="8" fill="#417b5a"/>
  <text x="626" y="618" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Retrieval coverage: 100%</text>
  <rect x="876" y="594" width="264" height="38" rx="8" fill="#9b6a17"/>
  <text x="898" y="618" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Mean viability: 0.740</text>
</svg>

