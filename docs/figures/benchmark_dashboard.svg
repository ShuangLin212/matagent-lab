<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Benchmark dashboard for MatAgent Lab</title>
  <desc id="desc">A dashboard-style visualization summarizing discovery metrics and agent traces.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17313a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #17313a; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #51656c; }
      .card-label { font: 700 13px Arial, Helvetica, sans-serif; fill: #51656c; }
      .card-value { font: 700 34px Arial, Helvetica, sans-serif; fill: #17313a; }
      .card-note { font: 400 12px Arial, Helvetica, sans-serif; fill: #6f7f84; }
      .panel-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #17313a; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #51656c; }
      .agent { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="640" rx="22" fill="#f7fbfc"/>
  <text class="title" x="60" y="58">Discovery Benchmark Snapshot</text>
  <text class="subtitle" x="60" y="84">Example robotics-actuator benchmark and AR-glasses report metrics from committed sample outputs.</text>

  <rect x="60" y="124" width="250" height="130" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="card-label" x="88" y="156">TOP CANDIDATE SCORE</text>
  <text class="card-value" x="88" y="204">0.726</text>
  <text class="card-note" x="88" y="230">robotics actuator benchmark</text>

  <rect x="335" y="124" width="250" height="130" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="card-label" x="363" y="156">CONSTRAINT PASS RATE</text>
  <text class="card-value" x="363" y="204">33.3%</text>
  <text class="card-note" x="363" y="230">mean across repeated runs</text>

  <rect x="610" y="124" width="250" height="130" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="card-label" x="638" y="156">RETRIEVAL COVERAGE</text>
  <text class="card-value" x="638" y="204">100%</text>
  <text class="card-note" x="638" y="230">all candidates linked to evidence</text>

  <rect x="885" y="124" width="255" height="130" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="card-label" x="913" y="156">SCREENING THROUGHPUT</text>
  <text class="card-value" x="913" y="204">19k/s</text>
  <text class="card-note" x="913" y="230">local deterministic demo</text>

  <rect x="60" y="294" width="520" height="266" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="panel-title" x="90" y="330">Agent Trace Surface</text>
  <text class="small" x="90" y="352">Each stage emits structured artifacts for auditability and future replacement by real tools.</text>

  <rect x="92" y="390" width="86" height="34" rx="7" fill="#28566a"/>
  <text class="agent" x="135" y="412" text-anchor="middle">Literature</text>
  <rect x="206" y="390" width="86" height="34" rx="7" fill="#417b5a"/>
  <text class="agent" x="249" y="412" text-anchor="middle">Candidate</text>
  <rect x="320" y="390" width="86" height="34" rx="7" fill="#417b5a"/>
  <text class="agent" x="363" y="412" text-anchor="middle">Screening</text>
  <rect x="434" y="390" width="86" height="34" rx="7" fill="#9b6a17"/>
  <text class="agent" x="477" y="412" text-anchor="middle">Synthesis</text>

  <line x1="178" y1="407" x2="206" y2="407" stroke="#9fb4b8" stroke-width="2"/>
  <line x1="292" y1="407" x2="320" y2="407" stroke="#9fb4b8" stroke-width="2"/>
  <line x1="406" y1="407" x2="434" y2="407" stroke="#9fb4b8" stroke-width="2"/>

  <rect x="92" y="462" width="428" height="54" rx="7" fill="#eef4f1" stroke="#c9d8d8"/>
  <text class="small" x="116" y="486">Trace fields: retrieved document IDs, candidate formulas, domain scores,</text>
  <text class="small" x="116" y="506">synthesis risks, pass rate, ranking score, and next experiments.</text>

  <rect x="620" y="294" width="520" height="266" rx="8" fill="#ffffff" stroke="#c9d8d8" filter="url(#shadow)"/>
  <text class="panel-title" x="650" y="330">Constraint-Aware Ranking</text>
  <text class="small" x="650" y="352">The critic combines scientific score, synthesis viability, evidence coverage, and penalties.</text>

  <rect x="656" y="394" width="390" height="18" rx="4" fill="#dfe9e8"/>
  <rect x="656" y="394" width="242" height="18" rx="4" fill="#28566a"/>
  <text class="small" x="1060" y="408">domain score 62%</text>

  <rect x="656" y="438" width="390" height="18" rx="4" fill="#dfe9e8"/>
  <rect x="656" y="438" width="109" height="18" rx="4" fill="#417b5a"/>
  <text class="small" x="1060" y="452">viability 28%</text>

  <rect x="656" y="482" width="390" height="18" rx="4" fill="#dfe9e8"/>
  <rect x="656" y="482" width="39" height="18" rx="4" fill="#9b6a17"/>
  <text class="small" x="1060" y="496">evidence 10%</text>

  <text class="small" x="656" y="532">Penalty channel: constraint violations reduce total score and surface risks for review.</text>

  <rect x="60" y="588" width="1080" height="28" rx="7" fill="#17313a"/>
  <text x="86" y="607" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Professional tool posture: reproducible reports, benchmarkable metrics, auditable traces, and clear hooks for production scientific backends.</text>
</svg>

